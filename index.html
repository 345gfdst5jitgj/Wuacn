<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Ultimate Secure Platform</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --bg-main: radial-gradient(circle at 50% 50%, #111126 0%, #070714 100%);
            --sidebar-bg: rgba(9, 9, 20, 0.8);
            --card-bg: rgba(255, 255, 255, 0.02);
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-gradient: linear-gradient(135deg, #a855f7, #f43f5e);
            --bubble-out: linear-gradient(135deg, #6366f1, #8b5cf6);
            --bubble-in: rgba(255, 255, 255, 0.03);
            --text-color: #e2e8f0;
        }

        .light-theme {
            --bg-main: #f1f5f9;
            --sidebar-bg: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-gradient: linear-gradient(135deg, #6366f1, #4f46e5);
            --bubble-out: linear-gradient(135deg, #4f46e5, #6366f1);
            --bubble-in: #ffffff;
            --text-color: #1e293b;
        }

        .cyber-theme {
            --bg-main: #000000;
            --sidebar-bg: rgba(0, 20, 10, 0.85);
            --card-bg: rgba(0, 255, 127, 0.03);
            --border-color: rgba(0, 255, 127, 0.2);
            --accent-gradient: linear-gradient(135deg, #00ff7f, #00ffff);
            --bubble-out: linear-gradient(135deg, #00aa50, #00ff7f);
            --bubble-in: rgba(0, 40, 20, 0.3);
            --text-color: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-main); color: var(--text-color); font-size: 14px; overflow: hidden; height: 100vh; transition: background 0.3s; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(244, 63, 94, 0.4); }

        .container { display: flex; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* ================= 登录配置中心 ================= */
        .login-screen { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .login-box {
            background: rgba(12, 12, 28, 0.7); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 28px; padding: 50px; width: 420px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1); text-align: center;
            animation: appScaleUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes appScaleUp { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .login-title { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-subtitle { font-size: 13px; color: #64748b; margin-bottom: 40px; }

        .input { width: 100%; padding: 15px 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 14px; color: #fff; font-family: inherit; transition: all 0.3s; font-size: 14px; margin-bottom: 16px; }
        .input:focus { outline: none; border-color: #a855f7; background: rgba(168, 85, 247, 0.04); box-shadow: 0 0 25px rgba(168, 85, 247, 0.2); }
        
        .btn { padding: 15px 20px; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); font-size: 14px; width: 100%; }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 15px 35px rgba(139, 92, 246, 0.45); }

        /* ================= 核心工作区面板 ================= */
        .sidebar { width: 360px; background: var(--sidebar-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .sidebar-header { padding: 26px; border-bottom: 1px solid var(--border-color); }
        .logo-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .logo-text { font-size: 22px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .profile-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 14px; }
        .profile-id-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-top: 8px; cursor: pointer; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; }
        .profile-id-row:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .search-area { padding: 16px 26px; display: flex; gap: 10px; border-bottom: 1px solid var(--border-color); }
        .search-area .input { margin-bottom: 0; padding: 12px 16px; border-radius: 12px; }
        .btn-search { width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-search:hover { background: rgba(168,85,247,0.1); border-color: #a855f7; }

        .list-title { padding: 20px 26px 10px 26px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #475569; letter-spacing: 1.5px; }
        .contacts-list { flex: 1; overflow-y: auto; padding: 0 14px 14px 14px; }
        
        .node-item { padding: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; cursor: pointer; border-radius: 16px; background: rgba(255,255,255,0.01); border: 1px solid transparent; transition: all 0.2s; }
        .node-item:hover { background: rgba(255,255,255,0.02); border-color: rgba(168,85,247,0.15); }
        .node-item.active { background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.3); }
        
        .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; background: linear-gradient(135deg, #6366f1, #a855f7); font-size: 14px; }
        .node-name { font-weight: 600; font-size: 14px; }
        .node-meta-p { font-size: 11px; color: #64748b; margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

        /* ================= 右侧多媒体聊天舞台 ================= */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.1); position: relative; }
        .chat-header { padding: 22px 34px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(10,10,22,0.1); }
        .header-actions { display: flex; gap: 14px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); color: #94a3b8; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .icon-btn:hover { color: #fff; background: rgba(255,255,255,0.06); border-color: #a855f7; }
        .icon-btn.active-call { background: #ef4444; color: white; border-color: #ef4444; animation: pulseCall 1.5s infinite; }
        @keyframes pulseCall { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .chat-body { flex: 1; padding: 34px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* 高级富媒体对话气泡 */
        .bubble-row { display: flex; flex-direction: column; max-width: 65%; width: fit-content; animation: bubbleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .bubble-row.outbound { align-self: flex-end; align-items: flex-end; }
        .bubble-row.inbound { align-self: flex-start; align-items: flex-start; }
        @keyframes bubbleIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .bubble { padding: 14px 20px; border-radius: 20px; line-height: 1.5; font-size: 14px; word-break: break-all; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .inbound .bubble { background: var(--bubble-in); border: 1px solid var(--border-color); border-top-left-radius: 4px; }
        .outbound .bubble { background: var(--bubble-out); color: white; border-top-right-radius: 4px; }
        
        /* 富媒体图片与文件渲染 */
        .bubble-img { max-width: 280px; max-height: 200px; border-radius: 12px; margin-top: 4px; cursor: zoom-in; object-fit: cover; display: block; border: 1px solid rgba(255,255,255,0.05); }
        .file-attachment { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 10px 14px; border-radius: 12px; margin-top: 4px; text-decoration: none; color: inherit; border: 1px solid rgba(255,255,255,0.05); }

        .bubble-meta { font-size: 11px; color: #475569; margin-top: 6px; display: flex; gap: 8px; align-items: center; }
        .outbound .bubble-meta { color: #64748b; }
        .secure-badge { color: #10b981; font-weight: 600; font-size: 10px; display: flex; align-items: center; gap: 3px; background: rgba(16,185,129,0.08); padding: 2px 6px; border-radius: 5px; }
        .status-receipt { font-size: 12px; color: #64748b; }
        .status-receipt.read { color: #38bdf8; }

        /* 输入底栏升级 */
        .chat-footer { padding: 24px 34px; border-top: 1px solid var(--border-color); background: rgba(10,10,22,0.2); }
        .footer-input-wrapper { display: flex; gap: 14px; align-items: center; }
        .chat-footer .input { margin-bottom: 0; background: rgba(0,0,0,0.2); padding: 15px 22px; border-radius: 14px; }
        .btn-send { width: auto; padding: 0 26px; height: 50px; border-radius: 14px; display: flex; align-items: center; gap: 8px; }
        
        .typing-indicator { font-size: 11px; color: #ec4899; height: 18px; margin-bottom: 6px; opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; gap: 6px; }
        .typing-indicator.show { opacity: 1; }
        
        /* 呼叫浮层弹窗 */
        .call-modal { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); background: #1e1b4b; border: 1px solid #4338ca; padding: 16px 24px; border-radius: 16px; display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1000; animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideDown { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        /* 放大灯箱 */
        .lightbox { position: fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; cursor:zoom-out; }
        .lightbox img { max-width:90%; max-height:90%; border-radius:8px; box-shadow:0 0 4px rgba(255,255,255,0.1); }

        .empty-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #334155; text-align: center; gap: 14px; }
        .empty-view i { font-size: 48px; color: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 登录配置中心 -->
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h1 class="login-title">Messenger Pro</h1>
                <p class="login-subtitle">量子多媒体安全信道集成终端</p>
                <input type="text" id="usernameInput" class="input" placeholder="配置您的全局数字签名别名..." maxlength="12">
                <button id="loginBtn" class="btn btn-primary">挂载核心安全套件</button>
            </div>
        </div>

        <!-- 2. 主工作台控制中心 -->
        <div id="appScreen" class="container hidden">
            <!-- 左侧控制面板 -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="logo-row">
                        <span class="logo-text">MPro Node</span>
                        <span style="font-size: 11px; background: rgba(168,85,247,0.15); color:#c084fc; padding:2px 8px; border-radius:20px;" id="onlineCounter">节点网络: 1</span>
                    </div>
                    <div class="profile-card">
                        <div style="font-weight:600; font-size:13px; display:flex; justify-content:space-between; align-items:center;">
                            <span id="myNodeName">@Identity</span>
                            <div style="display:flex; gap:6px;">
                                <i class="fa-solid fa-palette" style="cursor:pointer;" id="themeToggleBtn" title="切换视觉滤镜样式"></i>
                            </div>
                        </div>
                        <div class="profile-id-row" id="copyIdBtn" title="一键对拷本地唯一链路识别码">
                            <span id="myNodeId">ID: 正在派发特征码...</span>
                            <i class="fa-regular fa-copy"></i>
                        </div>
                    </div>
                </div>
                
                <div class="search-area">
                    <input type="text" id="targetIdInput" class="input" placeholder="输入远程网络终点特质 ID...">
                    <button id="searchBtn" class="btn-search" title="握手远端终点"><i class="fa-solid fa-plus"></i></button>
                </div>

                <div class="list-title">活动链路管道</div>
                <div class="contacts-list" id="nodesList"></div>
            </div>

            <!-- 右侧核心工作舞台 -->
            <div class="chat-main">
                <!-- 实时通话浮动挂件 -->
                <div id="callModal" class="call-modal hidden">
                    <span id="callStatusText" style="color:white; font-size:13px;">正在呼叫对方物理音频卡...</span>
                    <div style="display:flex; gap:10px;">
                        <button id="acceptCallBtn" class="btn hidden" style="background:#10b981; color:white; padding:6px 12px; border-radius:8px; width:auto; font-size:12px;">接听</button>
                        <button id="hangupCallBtn" class="btn" style="background:#ef4444; color:white; padding:6px 12px; border-radius:8px; width:auto; font-size:12px;">挂断</button>
                    </div>
                </div>

                <div class="chat-header hidden" id="chatHeader">
                    <div style="display:flex; align-items:center; gap:14px;">
                        <div class="avatar" id="activeAvatar">?</div>
                        <div>
                            <div class="node-name" id="activeNodeName">-</div>
                            <div class="node-meta-p" id="activeNodeId">-</div>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" id="voiceCallBtn" title="打通非对称加密音频语音流通道"><i class="fa-solid fa-phone"></i></button>
                        <button class="icon-btn" id="disconnectBtn" title="安全擦除当前节点内存缓存并切断链路"><i class="fa-solid fa-power-off"></i></button>
                    </div>
                </div>
                
                <!-- 核心滚动视窗 -->
                <div class="chat-body" id="chatBody">
                    <div class="empty-view" id="emptyView">
                        <i class="fa-solid fa-shield-cat"></i>
                        <p style="font-size:13px; color:#475569;">终端安全隔离挂载就绪。<br>请从左侧搜索添加对端物理识别码进入全功能高强度通道。</p>
                    </div>
                </div>

                <!-- 底端富媒体控制区 -->
                <div class="chat-footer hidden" id="chatFooter">
                    <div id="typingIndicator" class="typing-indicator">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> 远端正在封包多媒体切片...
                    </div>
                    <div class="footer-input-wrapper">
                        <!-- 富媒体一键上传按键 -->
                        <button class="icon-btn" id="attachBtn" style="height:50px; width:50px; border-radius:14px;" title="向管道推送二进制多媒体切片"><i class="fa-solid fa-paperclip"></i></button>
                        <input type="file" id="fileSelector" class="hidden" accept="image/*,application/pdf,text/plain,zip">
                        
                        <input type="text" id="messageInput" class="input" placeholder="注入高密网络流载荷...">
                        <button id="sendBtn" class="btn btn-primary btn-send">
                            <span>广播</span><i class="fa-solid fa-bolt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 顶层全局光箱 -->
    <div id="lightbox" class="lightbox hidden"></div>

    <script>
        let socket;
        let localKeyPair = null, localPublicKeyPem = "";
        let currentUserName = "";
        let isCryptoReady = true;

        let activeConversations = {};
        let currentLinkedNodeId = null;
        let typingTimeout;

        // WebRTC 语音矩阵变量
        let localStream = null;
        let peerConnection = null;
        let isCallIncoming = false;
        const rtcConfig = { iceServers: [{ urls: 'ice:://google.com' }] };

        // 离线持久化本地数据库矩阵结构 (IndexedDB)
        let db = null;
        function initIndexedDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open("MPro_Storage_v2", 1);
                request.onupgradeneeded = (e) => {
                    let database = e.target.result;
                    if(!database.objectStoreNames.contains("messages")) {
                        database.createObjectStore("messages", { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = () => { console.warn("DB无法挂载，转用全内存态"); resolve(); };
            });
        }

        function saveMsgToLocal(msgObj) {
            if(!db) return;
            const tx = db.transaction("messages", "readwrite");
            tx.objectStore("messages").add(msgObj);
        }

        function loadHistoryFromLocal(nodeId) {
            return new Promise((resolve) => {
                if(!db) return resolve([]);
                const tx = db.transaction("messages", "readonly");
                const store = tx.objectStore("messages");
                const list = [];
                store.openCursor().onsuccess = (e) => {
                    const cursor = e.target.result;
                    if(cursor) {
                        if(cursor.value.nodeLink === nodeId) list.push(cursor.value);
                        cursor.continue();
                    } else { resolve(list); }
                };
            });
        }

        // --- 算法模块，防死锁补丁版 ---
        async function setupSubtleCrypto() {
            try {
                if (!window.crypto || !window.crypto.subtle) throw new Error("缺少安全上下文");
                const keyPair = await window.crypto.subtle.generateKey(
                    { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                    true, ["encrypt", ["decrypt"]]
                );
                const pubBytes = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                return { keyPair, pem: btoa(String.fromCharCode(...new Uint8Array(pubBytes))) };
            } catch(e) {
                isCryptoReady = false;
                return { keyPair: null, pem: "FALLBACK_STREAM_NODE" };
            }
        }

        async function encryptFlow(text, pubPem) {
            if(!isCryptoReady || pubPem === "FALLBACK_STREAM_NODE") return "RAW_FLOW:" + btoa(encodeURIComponent(text));
            try {
                const binary = new Uint8Array(atob(pubPem).split("").map(c => c.charCodeAt(0)));
                const key = await window.crypto.subtle.importKey("spki", binary.buffer, { name: "RSA-OAEP", hash: "SHA-256" }, false, ["encrypt"]);
                const enc = await window.crypto.subtle.encrypt({ name: "RSA-OAEP" }, key, new TextEncoder().encode(text));
                return btoa(String.fromCharCode(...new Uint8Array(enc)));
            } catch(e) { return "RAW_FLOW:" + btoa(encodeURIComponent(text)); }
        }

        async function decryptFlow(cipher, privKey) {
            if(cipher.startsWith("RAW_FLOW:")) return decodeURIComponent(atob(cipher.replace("RAW_FLOW:", "")));
            if(!isCryptoReady || !privKey) return cipher;
            try {
                const binary = new Uint8Array(atob(cipher).split("").map(c => c.charCodeAt(0)));
                const dec = await window.crypto.subtle.decrypt({ name: "RSA-OAEP" }, privKey, binary.buffer);
                return new TextDecoder().decode(dec);
            } catch(e) { return "[多媒体切片解析异常或环境安全链断裂]"; }
        }

        // --- 核心驱动引擎与控制绑定 ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('usernameInput').value.trim();
            if(!user) return alert("初始化终止：签名别名不能为空");

            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> 正在布署端到端算法树...";

            await initIndexedDB();
            const cryptoResult = await setupSubtleCrypto();
            localKeyPair = cryptoResult.keyPair;
            localPublicKeyPem = cryptoResult.pem;
            currentUserName = user;

            socket = io();
            socket.on('connect', () => {
                document.getElementById('myNodeId').textContent = socket.id;
                document.getElementById('myNodeName').textContent = `@${currentUserName}`;
                socket.emit('node:online', { username: currentUserName, publicKey: localPublicKeyPem });
            });

            bindSocketMatrixEvents();

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
        });

        // 检索与握手远端
        document.getElementById('searchBtn').addEventListener('click', () => {
            const tId = document.getElementById('targetIdInput').value.trim();
            if(!tId || tId === socket.id) return alert("无效的对端特征特征识别码");

            socket.emit('node:search', tId, async (res) => {
                if(res.success) {
                    if(!activeConversations[res.node.id]) {
                        activeConversations[res.node.id] = {
                            id: res.node.id, username: res.node.username, publicKey: res.node.publicKey, history: []
                        };
                        const dbHistory = await loadHistoryFromLocal(res.node.id);
                        activeConversations[res.node.id].history = dbHistory;
                    }
                    document.getElementById('targetIdInput').value = '';
                    refreshNodeSidebarList();
                    openConversationChannel(res.node.id);
                } else { alert(res.message); }
            });
        });

        function refreshNodeSidebarList() {
            const list = document.getElementById('nodesList');
            list.innerHTML = '';
            Object.values(activeConversations).forEach(node => {
                const div = document.createElement('div');
