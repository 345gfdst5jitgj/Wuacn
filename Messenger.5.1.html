<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Pro - Professional Chat Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #0f0f1e 100%);
            color: #e0e0e0;
            font-size: 15px;
            overflow: hidden;
            height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 0, 211, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 0, 211, 0.5);
        }

        /* Animations */
        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(148, 0, 211, 0.4); }
            50% { box-shadow: 0 0 20px rgba(148, 0, 211, 0.6); }
        }

        /* Global Styles */
        .container {
            display: flex;
            height: 100vh;
        }

        .login-screen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #16213e 100%);
        }

        .login-box {
            background: rgba(30, 30, 60, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 0, 211, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: scaleIn 0.5s ease-out;
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #9400d3, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 0, 211, 0.2);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: #9400d3;
            background: rgba(148, 0, 211, 0.1);
            box-shadow: 0 0 20px rgba(148, 0, 211, 0.2);
        }

        .input::placeholder {
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #9400d3, #ff1493);
            color: white;
            box-shadow: 0 10px 30px rgba(148, 0, 211, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(148, 0, 211, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error-msg.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        /* Main App */
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, rgba(20, 20, 50, 0.9), rgba(30, 30, 60, 0.9));
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(148, 0, 211, 0.1);
            display: flex;
            flex-direction: column;
            animation: slideIn 0.5s ease-out;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(148, 0, 211, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #9400d3, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-id {
            font-size: 12px;
            color: #666;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .logout-btn {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .search-box {
            padding: 12px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 0, 211, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: #9400d3;
        }

        .contacts-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 0.5px;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
        }

        .contact-item {
            padding: 10px 8px;
            margin: 0 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .contact-item:hover {
            background: rgba(148, 0, 211, 0.15);
            border-left-color: #9400d3;
        }

        .contact-item.active {
            background: rgba(148, 0, 211, 0.25);
            border-left-color: #ff1493;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9400d3, #ff1493);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
        }

        .avatar.online::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #00ff00;
            border: 2px solid rgba(30, 30, 60, 0.9);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .avatar.offline::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #666;
            border: 2px solid rgba(30, 30, 60, 0.9);
            border-radius: 50%;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-status {
            font-size: 12px;
            color: #888;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 100%);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(148, 0, 211, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .message-group {
            display: flex;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        .message-group.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 50%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .message-bubble.received {
            background: rgba(148, 0, 211, 0.2);
            border: 1px solid rgba(148, 0, 211, 0.3);
            color: #e0e0e0;
        }

        .message-bubble.sent {
            background: linear-gradient(135deg, #9400d3, #ff1493);
            color: white;
            box-shadow: 0 4px 15px rgba(148, 0, 211, 0.3);
        }

        .message-time {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .voice-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 8px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(148, 0, 211, 0.1);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 0, 211, 0.2);
            border-radius: 10px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            resize: none;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #9400d3;
            background: rgba(148, 0, 211, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(148, 0, 211, 0.3);
            background: rgba(148, 0, 211, 0.1);
            color: #9400d3;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .action-btn:hover {
            background: rgba(148, 0, 211, 0.2);
            border-color: #9400d3;
            transform: translateY(-2px);
        }

        .send-btn {
            background: linear-gradient(135deg, #9400d3, #ff1493);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
        }

        .send-btn:hover {
            box-shadow: 0 0 20px rgba(148, 0, 211, 0.4);
        }

        .hidden { display: none !important; }

        .alert {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 16px;
            background: rgba(30, 30, 60, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 0, 211, 0.3);
            border-radius: 8px;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
            z-index: 100;
        }

        .alert.success { border-left: 3px solid #00ff00; }
        .alert.error { border-left: 3px solid #ff6b6b; }
        .alert.info { border-left: 3px solid #9400d3; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
    <div class="login-box">
        <div class="login-title">Messenger Pro</div>
        <div class="login-subtitle">Professional Chat Platform</div>

        <form id="login-form">
            <div class="form-group">
                <label class="label">用户ID</label>
                <input type="text" class="input" id="login-id" placeholder="user_alice123" required>
            </div>

            <div class="form-group">
                <label class="label">密码</label>
                <input type="password" class="input" id="login-pwd" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary">登录</button>

            <div class="error-msg" id="login-error"></div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(148, 0, 211, 0.1);">
                <div style="font-size: 12px; color: #888; margin-bottom: 8px;">📌 演示账户：</div>
                <div style="font-size: 12px; color: #666;">
                    <div>ID: user_alice123 / 密码: 123456</div>
                    <div>ID: user_bob456 / 密码: 123456</div>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Main App -->
<div id="app-screen" class="container hidden">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">💬 Messenger</div>
            <button class="logout-btn" id="logout-btn">登出</button>
        </div>

        <div style="padding: 12px 16px;">
            <div class="user-id" id="current-user"></div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="search-input" placeholder="搜索联系人...">
        </div>

        <div class="contacts-header">在线用户</div>
        <div class="contacts-list" id="contacts-list">
            <div style="padding: 16px; text-align: center; color: #666;">
                加载中...
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area">
        <div class="chat-header">
            <div class="chat-user-info" id="chat-info" style="display: none;">
                <div class="avatar online" id="chat-avatar" style="width: 40px; height: 40px; font-size: 14px;">U</div>
                <div>
                    <div class="contact-name" id="chat-name">Select User</div>
                    <div class="contact-status" id="chat-status">Online</div>
                </div>
            </div>

            <div id="empty-chat-header" style="color: #666;">选择一个用户开始聊天</div>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="empty-state">
                <div class="empty-icon">💬</div>
                <div>选择左侧的用户开始聊天</div>
            </div>
        </div>

        <div class="input-area" id="input-area" style="display: none;">
            <div class="input-wrapper">
                <textarea class="message-input" id="message-input" placeholder="输入消息..." rows="1"></textarea>
                <div class="action-buttons">
                    <button class="action-btn" id="emoji-btn" title="表情">😊</button>
                    <button class="action-btn" id="image-btn" title="图片">🖼️</button>
                    <button class="action-btn" id="voice-btn" title="语音">🎤</button>
                </div>
            </div>
            <button class="action-btn send-btn" id="send-btn" title="发送">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<input type="file" id="image-input" accept="image/*" style="display: none;">

<script>
    // User Database
    const USERS_DB = {
        'user_alice123': { pwd: '123456', name: 'Alice', color: '#9400d3' },
        'user_bob456': { pwd: '123456', name: 'Bob', color: '#ff1493' }
    };

    const app = {
        currentUser: null,
        currentChat: null,
        messages: {},
        contacts: [],

        init() {
            this.bindLoginEvents();
            this.loadData();
        },

        bindLoginEvents() {
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                this.login();
            });

            document.getElementById('logout-btn').addEventListener('click', () => {
                this.logout();
            });
        },

        login() {
            const userId = document.getElementById('login-id').value.trim();
            const pwd = document.getElementById('login-pwd').value;
            const errorEl = document.getElementById('login-error');

            if (!USERS_DB[userId]) {
                errorEl.textContent = '❌ 用户不存在';
                errorEl.classList.add('show');
                return;
            }

            if (USERS_DB[userId].pwd !== pwd) {
                errorEl.textContent = '❌ 密码错误';
                errorEl.classList.add('show');
                return;
            }

            errorEl.classList.remove('show');
            this.currentUser = userId;
            this.showApp();
            this.initApp();
        },

        logout() {
            this.currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-form').reset();
        },

        showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        },

        initApp() {
            document.getElementById('current-user').textContent = `🆔 ${this.currentUser}`;
            
            // Get all other users
            this.contacts = Object.keys(USERS_DB)
                .filter(id => id !== this.currentUser)
                .map(id => ({
                    id,
                    name: USERS_DB[id].name,
                    online: Math.random() > 0.3,
                    color: USERS_DB[id].color
                }));

            this.renderContacts();
            this.bindAppEvents();
            this.showAlert('👋 欢迎登录 Messenger Pro', 'info');
        },

        bindAppEvents() {
            document.getElementById('send-btn').addEventListener('click', () => this.sendMessage());
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    this.sendMessage();
                }
            });

            document.getElementById('emoji-btn').addEventListener('click', () => {
                const emojis = ['😊', '❤️', '😂', '🎉', '🔥', '👍', '💯', '😍', '🚀', '⭐'];
                const emoji = emojis[Math.floor(Math.random() * emojis.length)];
                const input = document.getElementById('message-input');
                input.value += emoji;
                input.focus();
            });

            document.getElementById('image-btn').addEventListener('click', () => {
                document.getElementById('image-input').click();
            });

            document.getElementById('image-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        this.addMessage({
                            type: 'image',
                            content: event.target.result
                        });
                    };
                    reader.readAsDataURL(file);
                    e.target.value = '';
                }
            });

            document.getElementById('voice-btn').addEventListener('click', () => {
                this.showAlert('🎤 录音中... (2秒后发送)', 'info');
                setTimeout(() => {
                    this.addMessage({
                        type: 'voice',
                        duration: '0:' + Math.floor(Math.random() * 60).toString().padStart(2, '0')
                    });
                }, 2000);
            });

            document.getElementById('search-input').addEventListener('input', (e) => {
                this.filterContacts(e.target.value);
            });
        },

        renderContacts() {
            const list = document.getElementById('contacts-list');
            list.innerHTML = this.contacts.map(contact => `
                <div class="contact-item" onclick="app.openChat('${contact.id}')">
                    <div class="avatar ${contact.online ? 'online' : 'offline'}" style="background: linear-gradient(135deg, ${contact.color}, ${contact.color}88);">
                        ${contact.name.substring(0, 2).toUpperCase()}
                    </div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-status">${contact.online ? '在线' : '离线'}</div>
                    </div>
                </div>
            `).join('');
        },

        filterContacts(search) {
            const filtered = this.contacts.filter(c => 
                c.name.toLowerCase().includes(search.toLowerCase()) ||
                c.id.includes(search)
            );

            if (filtered.length === 0) {
                document.getElementById('contacts-list').innerHTML = '<div style="padding: 16px; text-align: center; color: #666;">未找到用户</div>';
                return;
            }

            document.getElementById('contacts-list').innerHTML = filtered.map(contact => `
                <div class="contact-item" onclick="app.openChat('${contact.id}')">
                    <div class="avatar ${contact.online ? 'online' : 'offline'}" style="background: linear-gradient(135deg, ${contact.color}, ${contact.color}88);">
                        ${contact.name.substring(0, 2).toUpperCase()}
                    </div>
                    <div class="contact-info">
                        <div class="contact-name">${contact.name}</div>
                        <div class="contact-status">${contact.online ? '在线' : '离线'}</div>
                    </div>
                </div>
            `).join('');
        },

        openChat(contactId) {
            this.currentChat = contactId;
            const contact = this.contacts.find(c => c.id === contactId);

            document.getElementById('chat-info').style.display = 'flex';
            document.getElementById('empty-chat-header').style.display = 'none';
            document.getElementById('input-area').style.display = 'flex';

            document.getElementById('chat-name').textContent = contact.name;
            document.getElementById('chat-status').textContent = contact.online ? '在线' : '离线';
            document.getElementById('chat-avatar').textContent = contact.name.substring(0, 2).toUpperCase();
            document.getElementById('chat-avatar').style.background = `linear-gradient(135deg, ${contact.color}, ${contact.color}88)`;
            document.getElementById('chat-avatar').className = `avatar ${contact.online ? 'online' : 'offline'}`;

            this.renderMessages();
        },

        sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text || !this.currentChat) return;

            this.addMessage({
                type: 'text',
                content: text
            });

            input.value = '';
            input.focus();
        },

        addMessage(msg) {
            if (!this.currentChat) return;

            if (!this.messages[this.currentChat]) {
                this.messages[this.currentChat] = [];
            }

            this.messages[this.currentChat].push({
                ...msg,
                sent: true,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            });

            this.saveData();
            this.renderMessages();
        },

        renderMessages() {
            if (!this.currentChat) return;

            const msgs = this.messages[this.currentChat] || [];
            const container = document.getElementById('messages-container');

            if (msgs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div>开始与 ${this.contacts.find(c => c.id === this.currentChat)?.name} 聊天</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = msgs.map(msg => {
                let content = '';

                if (msg.type === 'text') {
                    content = `<div class="message-bubble ${msg.sent ? 'sent' : 'received'}">${this.escapeHtml(msg.content)}</div>`;
                } else if (msg.type === 'image') {
                    content = `<img src="${msg.content}" style="max-width: 300px; border-radius: 12px;">`;
                } else if (msg.type === 'voice') {
                    content = `<div class="voice-msg">🎤 语音消息 (${msg.duration})</div>`;
                }

                return `
                    <div class="message-group ${msg.sent ? 'sent' : ''}">
                        <div>
                            ${content}
                            <div class="message-time">${msg.time}</div>
                        </div>
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        },

        showAlert(text, type = 'success') {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = text;
            document.body.appendChild(alert);

            setTimeout(() => alert.remove(), 3000);
        },

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },

        saveData() {
            localStorage.setItem('messenger-data', JSON.stringify({
                messages: this.messages
            }));
        },

        loadData() {
            const data = JSON.parse(localStorage.getItem('messenger-data') || '{}');
            this.messages = data.messages || {};
        }
    };

    // Init
    app.init();
</script>
